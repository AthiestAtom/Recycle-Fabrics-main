<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>Test Fabric Classification API</h1>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="testAPI()">Test Classification</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const fileInput = document.getElementById('imageInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            console.log('Sending request...');
            
            try {
                const response = await fetch('http://localhost:3001/api/classify-fabric', {
                    method: 'POST',
                    body: formData,
                    mode: 'cors'
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error:', errorText);
                    document.getElementById('result').innerHTML = `Error: ${errorText}`;
                    return;
                }

                const data = await response.json();
                console.log('Success:', data);
                document.getElementById('result').innerHTML = `
                    <h3>Classification Result:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('result').innerHTML = `Fetch Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
