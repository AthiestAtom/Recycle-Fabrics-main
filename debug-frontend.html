<!DOCTYPE html>
<html>
<head>
    <title>API Debug Test</title>
</head>
<body>
    <h1>Fabric Classification API Test</h1>
    
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="testAPI()">Test Classification</button>
    
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const fileInput = document.getElementById('fileInput');
            const resultDiv = document.getElementById('result');
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '<p style="color: red;">Please select an image file first</p>';
                return;
            }
            
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('image', file);
            
            resultDiv.innerHTML = '<p>Testing API...</p>';
            
            try {
                console.log('Sending request to /api/classify-fabric');
                console.log('File:', file);
                console.log('FormData entries:', [...formData.entries()]);
                
                const response = await fetch('/api/classify-fabric', {
                    method: 'POST',
                    body: formData,
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error response:', errorText);
                    resultDiv.innerHTML = `<p style="color: red;">Error: ${response.status} - ${errorText}</p>`;
                    return;
                }
                
                const data = await response.json();
                console.log('Success response:', data);
                
                resultDiv.innerHTML = `
                    <h3>✅ Success!</h3>
                    <p><strong>Material:</strong> ${data.result.material}</p>
                    <p><strong>Confidence:</strong> ${(data.result.confidence * 100).toFixed(2)}%</p>
                    <p><strong>Model:</strong> ${data.model_info.type}</p>
                    <p><strong>Deep Learning:</strong> ${data.model_info.deep_learning ? 'Yes' : 'No'}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
            } catch (error) {
                console.error('Fetch error:', error);
                resultDiv.innerHTML = `<p style="color: red;">Fetch Error: ${error.message}</p>`;
            }
        }
        
        // Also test health endpoint
        async function testHealth() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                console.log('Health check:', data);
            } catch (error) {
                console.error('Health check error:', error);
            }
        }
        
        // Run health check on load
        testHealth();
    </script>
</body>
</html>
